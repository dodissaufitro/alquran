<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kembali ke Talaqee</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e8f5f3;
        color: #004d40;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 360px;
        background: #fff;
        border-radius: 16px;
        padding: 28px 22px;
        box-shadow: 0 8px 32px rgba(0, 77, 64, 0.12);
      }
      h1 {
        font-size: 1.15rem;
        margin: 0 0 8px;
      }
      p {
        font-size: 0.9rem;
        line-height: 1.5;
        margin: 0 0 16px;
        color: #546e7a;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #b2dfdb;
        border-top-color: #00796b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Membuka aplikasi…</h1>
      <p id="hint">Memproses pembayaran…</p>
    </div>
    <script>
      ;(function () {
        var params = new URLSearchParams(window.location.search)
        var kind = params.get('fp_payment') || 'success'
        var orderId = params.get('orderId') || ''
        var syncToken = params.get('syncToken') || ''
        var deep =
          'com.talaqee.myapp://payment?fp_payment=' +
          encodeURIComponent(kind) +
          '&orderId=' +
          encodeURIComponent(orderId) +
          (syncToken
            ? '&syncToken=' + encodeURIComponent(syncToken)
            : '')

        function tryDeepLink() {
          window.location.replace(deep)
        }

        function syncPayment() {
          if (!orderId || !syncToken || kind !== 'success') {
            return Promise.resolve()
          }
          var url =
            '/api/coins/payment-sync.php?orderId=' +
            encodeURIComponent(orderId) +
            '&syncToken=' +
            encodeURIComponent(syncToken)
          return fetch(url, { method: 'GET', credentials: 'omit' })
            .then(function (res) {
              return res.json()
            })
            .then(function (data) {
              if (data && data.paid) {
                var el = document.getElementById('hint')
                if (el) {
                  el.textContent = 'Pembayaran berhasil. Membuka aplikasi…'
                }
              }
            })
            .catch(function () {
              /* app akan polling ulang */
            })
        }

        syncPayment().finally(function () {
          tryDeepLink()
          setTimeout(tryDeepLink, 400)
          setTimeout(tryDeepLink, 1200)
        })

        setTimeout(function () {
          var el = document.getElementById('hint')
          if (el) {
            el.textContent =
              'Jika aplikasi tidak terbuka, tutup tab ini lalu buka Talaqee. Saldo coin akan diperbarui otomatis.'
          }
        }, 3500)
      })()
    </script>
  </body>
</html>
