<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4d3a"/>
      <stop offset="100%" stop-color="#063327"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <linearGradient id="arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6b52"/>
      <stop offset="100%" stop-color="#1a4030"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky)"/>
  <circle cx="620" cy="120" r="70" fill="url(#sun)" opacity="0.9"/>
  <ellipse cx="400" cy="580" rx="500" ry="80" fill="#0a2818" opacity="0.5"/>
  <!-- Arches -->
  <g fill="url(#arch)">
    <path d="M80 600 V280 Q200 120 320 280 V600 Z"/>
    <path d="M240 600 V220 Q400 40 560 220 V600 Z"/>
    <path d="M480 600 V280 Q600 120 720 280 V600 Z"/>
  </g>
  <!-- Light rays -->
  <g opacity="0.15" fill="#FFC107">
    <polygon points="620,120 400,600 520,600"/>
    <polygon points="620,120 280,600 400,600"/>
    <polygon points="620,120 520,600 640,600"/>
  </g>
  <!-- Columns -->
  <g fill="#0d3d2e" opacity="0.6">
    <rect x="195" y="200" width="18" height="400" rx="4"/>
    <rect x="385" y="160" width="22" height="440" rx="4"/>
    <rect x="585" y="200" width="18" height="400" rx="4"/>
  </g>
  <!-- Floor pattern -->
  <g opacity="0.2" stroke="#FFC107" stroke-width="1">
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="520" x2="700" y2="520"/>
    <line x1="200" y1="540" x2="600" y2="540"/>
  </g>
</svg>
