# Production: https://app.talaqee.com/
# Usage:
#   cp api/config.local.production.example.php api/config.local.php
#   npm run build
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec alquran php /app/api/sync-mysql.php
#
# Nginx Proxy Manager: app.talaqee.com → HTTPS (tanpa port di URL)

services:
  alquran:
    build: .
    image: alquran:php82
    container_name: alquran
    ports:
      - '80:80'
    volumes:
      - ./dist:/app/dist:ro
      - ./api:/app/api
      - ./router.php:/app/router.php:ro
      - ./uploads:/app/uploads
      - ./api/talaqqi/uploads:/app/api/talaqqi/uploads
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      DB_HOST: host.docker.internal
    restart: unless-stopped
