# Nginx Proxy Manager — app.talaqee.com → container alquran:80
#
# Di NPM: Proxy Hosts → Add → Forward ke http://<IP-VPS>:80 atau http://alquran:80
#
# PENTING — jangan tambahkan di "Custom Locations" atau "Advanced":
#   try_files $uri /index.html;
# Itu akan menelan /admin.html dan /api/* sebelum sampai ke PHP router.
#
# Biarkan NPM hanya reverse-proxy biasa (default sudah cukup):
#
#   location / {
#     proxy_pass http://alquran:80;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#   }
#
# Uji setelah deploy:
#   https://app.talaqee.com/admin.html          → halaman login CMS
#   https://app.talaqee.com/api/cms/public/health.php → JSON ok
#   https://app.talaqee.com/assets/admin-*.js     → JavaScript (bukan index.html)
