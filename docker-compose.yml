# Talaqee — Docker production (PHP 8.2 + MariaDB)
#
# 1. Salin: cp api/config.local.docker.php.example api/config.local.php
#    Edit password MySQL & CMS di config.local.php
# 2. npm run build (lokal) → upload dist/
# 3. docker compose up -d --build
# 4. docker compose exec alquran php /app/api/sync-mysql.php
#
# Production domain + DB eksternal: lihat docker-compose.prod.yml
# Tes: https://app.talaqee.com/api/cms/public/health.php

services:
  db:
    image: "mariadb:11"
    container_name: alquran-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-faithfulpath_db_2026}
      MYSQL_DATABASE: alquran
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5

  alquran:
    build: .
    image: alquran:php82
    container_name: alquran
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8090:80'
    volumes:
      - ./dist:/app/dist:ro
      - ./api:/app/api
      - ./router.php:/app/router.php:ro
      - ./api/talaqqi/uploads:/app/api/talaqqi/uploads
    restart: unless-stopped

volumes:
  mysql_data:
